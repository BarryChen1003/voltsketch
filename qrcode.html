<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltSketch - QR Code</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    #qrcode {
      margin: 20px auto;
    }
    .url {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      color: #333;
    }
    .instructions {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 10px;
      text-align: left;
      font-size: 13px;
      color: #2e7d32;
    }
    .instructions h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 5px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      background: #5a6fd6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VoltSketch 硬體實驗室</h1>
    <p class="subtitle">用手機掃描 QR Code 開啟網站</p>
    
    <div id="qrcode"></div>
    
    <div class="url" id="urlDisplay">載入中...</div>
    
    <div class="instructions">
      <h3>📱 使用步驟：</h3>
      <ol>
        <li>確保手機和電腦在同一網路</li>
        <li>打開手機相機或 QR Code 掃描器</li>
        <li>掃描上方 QR Code</li>
        <li>在瀏覽器中開啟連結</li>
      </ol>
    </div>
    
    <button class="btn" onclick="startServer()">啟動本地伺服器</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // Generate QR Code for localhost
    function generateQR(url) {
      const qrcode = document.getElementById('qrcode');
      qrcode.innerHTML = '';
      
      QRCode.toCanvas(qrcode, url, {
        width: 256,
        margin: 2,
        color: {
          dark: '#000000',
          light: '#ffffff'
        }
      }, function(error) {
        if (error) {
          console.error(error);
        }
      });
      
      document.getElementById('urlDisplay').textContent = url;
    }

    // Get local IP address
    function getLocalIP() {
      // Default to localhost
      return 'http://localhost:8080';
    }

    // Start local server
    function startServer() {
      const url = getLocalIP();
      generateQR(url);
      
      alert('請在終端機中執行以下命令啟動伺服器：\n\nnpx serve . -p 8080\n\n然後用手機掃描 QR Code');
    }

    // Generate QR on load
    window.onload = function() {
      generateQR(getLocalIP());
    };
  </script>
</body>
</html>
