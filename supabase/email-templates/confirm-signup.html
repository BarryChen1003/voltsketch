<!-- HardwareAI — 註冊確認信模板
     貼到：Supabase Dashboard → Authentication → Emails → Templates → "Confirm signup"
     變數由 Supabase 代入：{{ .ConfirmationURL }} = 確認連結。信件用 inline CSS（email client 相容）。 -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8fc;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;">
  <tr><td align="center">
    <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
      <tr><td style="background:#0f172a;padding:20px 28px;">
        <span style="color:#ffffff;font-size:18px;font-weight:700;">HardwareAI</span>
        <span style="color:#94a3b8;font-size:13px;"> 硬體實驗室</span>
      </td></tr>
      <tr><td style="padding:28px;">
        <h1 style="margin:0 0 12px;color:#0f172a;font-size:20px;">確認你的信箱</h1>
        <p style="margin:0 0 20px;color:#475569;font-size:15px;line-height:1.7;">
          歡迎加入 HardwareAI。點下方按鈕完成註冊，即可使用線路圖編輯器、IC 元件庫、PCB Layout 與硬體知識庫。
        </p>
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;"><tr>
          <td style="border-radius:8px;background:#0e9f6e;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">確認信箱並啟用帳號</a>
          </td>
        </tr></table>
        <p style="margin:0 0 8px;color:#94a3b8;font-size:12px;line-height:1.6;">
          按鈕無法點擊時，複製此連結到瀏覽器：<br>
          <a href="{{ .ConfirmationURL }}" style="color:#0e9f6e;word-break:break-all;">{{ .ConfirmationURL }}</a>
        </p>
        <p style="margin:16px 0 0;color:#94a3b8;font-size:12px;">若非你本人註冊，忽略此信即可，帳號不會啟用。</p>
      </td></tr>
      <tr><td style="background:#f8fafc;padding:16px 28px;border-top:1px solid #e2e8f0;">
        <span style="color:#94a3b8;font-size:12px;">HardwareAI · 此信由系統自動發送，請勿直接回覆</span>
      </td></tr>
    </table>
  </td></tr>
</table>
