<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HW Engineer Pro - Hardware Engineering Learning Platform</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #e0e0e0; background: #0a0e27; line-height: 1.6; }
body { overflow: hidden; }

.app-container { display: flex; height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar { width: 240px; background: #0f1529; border-right: 1px solid #1a2744; padding: 20px 0; overflow-y: auto; flex-shrink: 0; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: #0f1529; }
.sidebar::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 3px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: #3a4a7a; }

.sidebar-logo { font-size: 18px; font-weight: bold; padding: 15px 20px; color: #00d4ff; background: linear-gradient(135deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }

.lang-toggle { display: flex; gap: 10px; padding: 0 15px; margin-bottom: 20px; }
.lang-btn { flex: 1; padding: 8px; border: 1px solid #2a3a5a; background: transparent; color: #888; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: 600; transition: all 0.3s; }
.lang-btn:hover { border-color: #00d4ff; color: #00d4ff; }
.lang-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }

.nav-section { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #666; padding: 15px 20px 8px; text-transform: uppercase; }

.nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #aaa; transition: all 0.3s; font-size: 14px; position: relative; }
.nav-item:hover { color: #00d4ff; background: rgba(0, 212, 255, 0.05); padding-left: 25px; }
.nav-item.active { color: #00d4ff; background: rgba(0, 212, 255, 0.1); border-left: 3px solid #00d4ff; padding-left: 17px; font-weight: 600; }

.badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; margin-left: auto; }
.badge.green { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
.badge.orange { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
.badge.red { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; overflow-y: auto; padding: 40px; background: #0a0e27; }
.main-content::-webkit-scrollbar { width: 8px; }
.main-content::-webkit-scrollbar-track { background: #0a0e27; }
.main-content::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 4px; }
.main-content::-webkit-scrollbar-thumb:hover { background: #3a4a7a; }

/* ===== HERO SECTION ===== */
.hero { text-align: center; margin-bottom: 60px; animation: fadeInUp 0.8s ease-out; }
.hero-title { font-size: 48px; font-weight: 700; margin-bottom: 15px; background: linear-gradient(135deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-subtitle { font-size: 18px; color: #aaa; margin-bottom: 30px; }

.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }

.feature-card { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 12px; padding: 25px; animation: fadeInUp 0.8s ease-out; transition: all 0.3s; }
.feature-card:hover { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); transform: translateY(-5px); }
.feature-card-icon { font-size: 32px; margin-bottom: 15px; }
.feature-card-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: #fff; }
.feature-card-desc { font-size: 14px; color: #aaa; line-height: 1.8; }

.pricing-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 60px; }
.pricing-card { background: linear-gradient(135deg, #111827, #1a2744); border: 2px solid #2a3a5a; border-radius: 12px; padding: 30px; transition: all 0.3s; position: relative; }
.pricing-card.featured { border-color: #00d4ff; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
.pricing-card.featured::before { content: 'POPULAR'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #00d4ff; color: #000; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.pricing-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #fff; }
.pricing-price { font-size: 32px; font-weight: 700; color: #00d4ff; margin-bottom: 20px; }
.pricing-price span { font-size: 16px; color: #aaa; }
.pricing-features { list-style: none; margin-bottom: 25px; }
.pricing-features li { padding: 10px 0; border-bottom: 1px solid #2a3a5a; color: #ccc; font-size: 14px; }
.pricing-features li:before { content: '✓ '; color: #00ff88; font-weight: 700; margin-right: 8px; }
.pricing-btn { width: 100%; padding: 12px; border: 1px solid #00d4ff; background: transparent; color: #00d4ff; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; }
.pricing-btn:hover { background: #00d4ff; color: #000; }

/* ===== COURSES ===== */
.courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

.course-card { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; overflow: hidden; animation: fadeInUp 0.6s ease-out; transition: all 0.3s; cursor: pointer; }
.course-card:hover { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.15); transform: translateY(-3px); }

.course-header { padding: 20px; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 255, 136, 0.1)); border-bottom: 1px solid #2a3a5a; }
.course-level { font-size: 12px; font-weight: 700; color: #00d4ff; text-transform: uppercase; margin-bottom: 8px; }
.course-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.course-subtitle { font-size: 13px; color: #999; }

.course-body { padding: 20px; }
.course-overview { font-size: 14px; color: #ccc; line-height: 1.7; margin-bottom: 15px; }

.course-footer { padding: 15px 20px; background: rgba(0, 0, 0, 0.2); border-top: 1px solid #2a3a5a; display: flex; gap: 10px; }
.btn-expand { flex: 1; padding: 8px 12px; border: 1px solid #00d4ff; background: transparent; color: #00d4ff; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; transition: all 0.3s; }
.btn-expand:hover { background: #00d4ff; color: #000; }

.course-expanded { background: linear-gradient(135deg, #111827, #1a2744); border: 2px solid #00d4ff; margin: 20px 0; padding: 30px; border-radius: 10px; animation: fadeInUp 0.5s ease-out; }
.course-expanded-title { font-size: 24px; font-weight: 700; color: #00d4ff; margin-bottom: 20px; }
.course-section { margin-bottom: 30px; }
.course-section-title { font-size: 16px; font-weight: 700; color: #00ff88; margin-bottom: 12px; text-transform: uppercase; }
.course-section-content { font-size: 14px; color: #ccc; line-height: 1.8; margin-bottom: 15px; }

.formulas-box { background: rgba(0, 212, 255, 0.05); border-left: 3px solid #00d4ff; padding: 15px; border-radius: 6px; margin: 15px 0; font-family: 'Courier New', monospace; font-size: 13px; color: #00d4ff; }
.formula-line { padding: 8px 0; }

.diagram-container { background: #111827; border: 1px solid #2a3a5a; border-radius: 8px; padding: 20px; margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; color: #666; }

/* Course viewer cards */
.formula-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.formula-box { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); border-radius: 6px; padding: 6px 14px; font-family: 'Courier New', monospace; font-size: 12px; color: #00ff88; }
.formula-box code { font-family: inherit; }
.diagram-box { background: #060d1a; border: 1px solid #1a3050; border-radius: 8px; padding: 16px; margin: 8px 0; text-align: center; overflow: hidden; }
.diagram-box svg { max-width: 100%; height: auto; }
.expand-arrow { color: #00d4ff; font-size: 14px; transition: transform 0.3s; user-select: none; }

/* ===== SIMULATOR ===== */
.simulator-container { display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

.circuit-canvas { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; padding: 20px; min-height: 500px; position: relative; }
.circuit-canvas canvas { width: 100%; height: 100%; background: #0a0e27; border-radius: 8px; }

.sim-controls { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; padding: 20px; }
.control-group { margin-bottom: 20px; }
.control-label { font-size: 12px; font-weight: 700; color: #00d4ff; text-transform: uppercase; margin-bottom: 8px; display: block; }
.control-input { width: 100%; padding: 8px 12px; background: #0a0e27; border: 1px solid #2a3a5a; color: #e0e0e0; border-radius: 6px; font-size: 13px; }
.control-input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
.control-slider { width: 100%; cursor: pointer; }

.btn-simulate { width: 100%; padding: 12px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; color: #000; border-radius: 6px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 14px; }
.btn-simulate:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
.btn-simulate:active { transform: scale(0.98); }

.display-panel { background: #0a0e27; border: 1px solid #2a3a5a; border-radius: 8px; padding: 12px; margin-top: 15px; text-align: center; }
.display-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
.display-value { font-size: 18px; font-weight: 700; color: #00ff88; font-family: 'Courier New', monospace; }

.oscilloscope { background: #0a0e27; border: 2px solid #00d4ff; border-radius: 8px; padding: 15px; margin-top: 15px; }
.scope-grid { display: grid; width: 100%; height: 200px; background: linear-gradient(0deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; border: 1px solid #00d4ff; border-radius: 4px; position: relative; }
.scope-trace { position: absolute; width: 100%; height: 100%; stroke: #00ff88; stroke-width: 2px; fill: none; }

/* ===== COMPONENTS ===== */
.components-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
.component-box { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 8px; padding: 20px; text-align: center; transition: all 0.3s; cursor: pointer; animation: fadeInUp 0.6s ease-out; }
.component-box:hover { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); transform: scale(1.05); }
.component-icon { font-size: 40px; margin-bottom: 10px; }
.component-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.component-desc { font-size: 12px; color: #999; }

/* ===== PCB LAYOUT ===== */
.pcb-container { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
.pcb-canvas { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; padding: 20px; min-height: 500px; }
.pcb-canvas canvas { width: 100%; height: 100%; background: #0a0e27; border-radius: 8px; }

.pcb-info { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; padding: 20px; }
.info-group { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #2a3a5a; }
.info-group:last-child { border-bottom: none; margin-bottom: 0; }
.info-label { font-size: 11px; font-weight: 700; color: #00d4ff; text-transform: uppercase; margin-bottom: 10px; }
.info-item { font-size: 13px; color: #ccc; margin-bottom: 8px; display: flex; justify-content: space-between; }
.info-value { color: #00ff88; font-weight: 600; }

/* ===== SIGNALS ===== */
.signals-container { display: grid; grid-template-columns: 1fr 280px; gap: 30px; }

.tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #2a3a5a; }
.tab { padding: 12px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; font-weight: 600; font-size: 13px; transition: all 0.3s; text-transform: uppercase; }
.tab:hover { color: #00d4ff; }
.tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }

.tab-content { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; padding: 25px; animation: fadeInUp 0.5s ease-out; }
.tab-content h3 { font-size: 18px; font-weight: 700; color: #00d4ff; margin-bottom: 15px; }
.tab-content p { font-size: 14px; color: #ccc; line-height: 1.8; margin-bottom: 15px; }

.timing-diagram { background: #0a0e27; border: 1px solid #2a3a5a; border-radius: 8px; padding: 15px; margin: 15px 0; }
.timing-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; }
.timing-wave { width: 100%; height: 40px; background: linear-gradient(0deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px); background-size: 100% 4px; border: 1px solid #2a3a5a; border-radius: 4px; position: relative; margin-bottom: 10px; }
.wave-signal { position: absolute; width: 100%; height: 100%; }

.signal-legend { display: grid; grid-template-columns: 1fr; gap: 10px; }
.legend-item { font-size: 12px; padding: 8px; background: rgba(0, 212, 255, 0.05); border-left: 3px solid #00d4ff; border-radius: 4px; color: #ccc; }

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
  50% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.6); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes currentFlow {
  0% { stroke-dashoffset: 100; }
  100% { stroke-dashoffset: 0; }
}

@keyframes drawLine {
  from { stroke-dasharray: 100; stroke-dashoffset: 100; }
  to { stroke-dasharray: 100; stroke-dashoffset: 0; }
}

@keyframes blink {
  0%, 49%, 100% { opacity: 1; }
  50%, 99% { opacity: 0.2; }
}

.glow-effect { animation: glow 2s ease-in-out infinite; }
.pulse-effect { animation: pulse 2s ease-in-out infinite; }
.current-animation { animation: currentFlow 1.5s linear infinite; stroke-dasharray: 10, 5; }
.draw-animation { animation: drawLine 2s ease-out forwards; }

/* ===== UTILITIES ===== */
.text-center { text-align: center; }
.mt-20 { margin-top: 20px; }
.mt-40 { margin-top: 40px; }
.mb-20 { margin-bottom: 20px; }
.hidden { display: none !important; }

/* ===== LOGIC & TIMING SECTION ===== */
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin: 30px 0; }
.topic-card { background: rgba(0,212,255,0.05); border: 1px solid #1a2744; border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.3s; }
.topic-card:hover { border-color: #00d4ff; transform: translateY(-3px); }
.topic-icon { font-size: 28px; margin-bottom: 10px; }
.diagram-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
.diagram-showcase { margin-top: 30px; }
.diagram-showcase h3 { color: #00d4ff; margin-bottom: 10px; }

/* ===== INTERVIEW SECTION ===== */
.interview-topics { display: grid; gap: 20px; margin: 25px 0; }
.interview-topic-card { background: rgba(0,212,255,0.03); border: 1px solid #1a2744; border-radius: 10px; padding: 20px; }
.interview-topic-card h3 { color: #00d4ff; margin-bottom: 12px; font-size: 16px; }
.interview-topic-card ul { list-style: none; padding: 0; }
.interview-topic-card li { padding: 6px 0; color: #ccc; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.interview-topic-card li:before { content: '▸ '; color: #00ff88; }
.interview-topic-card li:last-child { border-bottom: none; }

.interview-tips { margin-top: 30px; }
.interview-tips h3 { color: #ffc107; margin-bottom: 15px; }
.tip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
.tip-card { background: rgba(255,193,7,0.05); border: 1px solid rgba(255,193,7,0.2); border-radius: 8px; padding: 15px; }
.tip-card strong { color: #ffc107; display: block; margin-bottom: 8px; }
.tip-card p { color: #aaa; font-size: 13px; }

/* ===== EXAM SECTION ===== */
.exam-container { max-width: 950px; }
.exam-category { margin-bottom: 35px; }
.exam-category-title { font-size: 18px; font-weight: 700; color: #00d4ff; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #1a2744; }
.exam-q { background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; margin-bottom: 15px; overflow: hidden; transition: all 0.3s; }
.exam-q:hover { border-color: #00d4ff; }
.exam-q-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.exam-q-num { color: #00d4ff; font-weight: 700; font-size: 14px; margin-right: 12px; white-space: nowrap; }
.exam-q-text { color: #e0e0e0; font-size: 14px; flex: 1; line-height: 1.7; }
.exam-q-text code { background: rgba(0,212,255,0.1); color: #00d4ff; padding: 1px 6px; border-radius: 3px; font-size: 13px; }
.exam-q-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; margin-left: 10px; white-space: nowrap; }
.exam-q-badge.fill { background: rgba(0,255,136,0.15); color: #00ff88; }
.exam-q-badge.calc { background: rgba(0,212,255,0.15); color: #00d4ff; }
.exam-q-badge.draw { background: rgba(255,193,7,0.15); color: #ffc107; }
.exam-q-badge.mc { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.exam-ans { display: none; padding: 0 20px 20px; }
.exam-ans.show { display: block; animation: fadeInUp 0.3s ease-out; }
.exam-ans-label { font-size: 12px; font-weight: 700; color: #00ff88; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
.exam-ans-content { color: #ccc; font-size: 13px; line-height: 1.8; }
.exam-ans-content strong { color: #ffc107; }
.exam-ans-content .formula-highlight { background: rgba(0,212,255,0.08); border-left: 3px solid #00d4ff; padding: 8px 12px; margin: 10px 0; font-family: 'Courier New', monospace; font-size: 12px; color: #00d4ff; border-radius: 4px; }
.exam-ans-content .key-point { background: rgba(0,255,136,0.08); border-left: 3px solid #00ff88; padding: 8px 12px; margin: 10px 0; font-size: 12px; color: #00ff88; border-radius: 4px; }
.exam-diagram-box { background: #060d1a; border: 1px solid #1a3050; border-radius: 8px; padding: 12px; margin: 12px 0; text-align: center; overflow: hidden; }
.exam-diagram-box svg { max-width: 100%; height: auto; }
.exam-toggle-btn { display: inline-block; padding: 6px 16px; border: 1px solid #00d4ff; background: transparent; color: #00d4ff; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 5px; }
.exam-toggle-btn:hover { background: #00d4ff; color: #000; }
.exam-score-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding: 15px 20px; background: linear-gradient(135deg, #111827, #1a2744); border: 1px solid #2a3a5a; border-radius: 10px; }
.exam-score-bar .score-label { color: #888; font-size: 13px; }
.exam-score-bar .score-num { color: #00ff88; font-size: 22px; font-weight: 700; font-family: 'Courier New', monospace; }
.exam-filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.exam-filter-btn { padding: 6px 14px; border: 1px solid #2a3a5a; background: transparent; color: #888; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
.exam-filter-btn:hover, .exam-filter-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.08); }
.exam-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.exam-table th, .exam-table td { border: 1px solid #2a3a5a; padding: 8px 12px; text-align: center; font-size: 13px; }
.exam-table th { background: rgba(0,212,255,0.1); color: #00d4ff; font-weight: 600; }
.exam-table td { color: #ccc; }
.exam-option { display: block; padding: 6px 0; color: #ccc; font-size: 13px; }
.exam-option input[type="radio"] { margin-right: 8px; accent-color: #00d4ff; }
</style>
</head>
<body>
<div id="app" class="app-container">
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-logo">⚡ HW Engineer Pro</div>

    <div class="lang-toggle">
      <button id="btn-en" class="lang-btn active" onclick="setLang('en')">EN</button>
      <button id="btn-zh" class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>

    <div class="nav-section" data-t="nav.general">GENERAL</div>

// ===== HELPER FUNCTIONS =====
function t(key) {
  const val = getNestedValue(TR[currentLang], key);
  return val || key;
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => o && o[k], obj);
}

// ===== NAVIGATION =====
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');

  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const val = getNestedValue(TR[lang], key);
    if (val) el.textContent = val;
  });

  navigate(currentPage);
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  const content = document.getElementById('content');
  const renderers = {
    home: renderHome,
    simulator: renderSimulator,
    beginner: () => renderCourses('beginner'),
    intermediate: () => renderCourses('intermediate'),
    advanced: () => renderCourses('advanced'),
    components: renderComponents,
    pcb: renderPCB,
    signals: renderSignals,
    logic: renderLogic,
    interview: renderInterview,
    exam: renderExam,
  };

  const renderer = renderers[page];
  if (renderer) {
    content.innerHTML = '';
    const html = renderer();
    content.innerHTML = html;

    if (page === 'simulator') setTimeout(initSimulator, 100);
    if (page === 'signals') setTimeout(initSignalAnimations, 100);
    if (page === 'pcb') setTimeout(initPCBCalculator, 100);
  }
}

    overview_zh: '電磁干擾（EMI）和電磁相容性（EMC）在現代電子產品中至關重要。遮蔽、接地和佈局技術可最小化發射和改善對外部干擾的免疫。正確的 EMI/EMC 設計通常可防止昂貴的重新設計和監管失敗。',

    overview: 'I2C (Inter-Integrated Circuit) is a master-slave, two-wire serial bus using SDA (data) and SCL (clock). Master (typically SOC/CPU) initiates communication by generating SCL clock and sending Start/Stop conditions. Slave devices (touch IC, audio codec, sensors, Smart AMP) respond when addressed. Each slave has a unique 7-bit or 10-bit address (e.g., 0x15). I2C uses open-drain drivers requiring external pull-up resistors — the single most critical design parameter affecting signal quality.',

    overview_zh: '序列周邊介面（SPI）是使用獨立時鐘和數據線的同步串行通訊協議。與 I2C 不同，SPI 為每個從機使用單獨的晶片選擇線，不需要開漏輸出。SPI 比 I2C 更快更簡單，使其非常適合高速應用。',

    details: 'Crystal oscillators provide the reference clock with ±20-50ppm frequency accuracy. The PLL multiplies this reference to generate higher system clocks: fout = fref × (N/M) where N is the feedback divider and M is the reference divider. PLL jitter comes from VCO phase noise, reference clock noise, and charge pump noise. Total jitter = deterministic jitter (DJ) + random jitter (RJ). For serial links (PCIe, USB), total jitter budget is typically < 0.3UI (Unit Interval). Clock skew between destinations must be < setup time margin. H-tree and balanced buffer tree topologies equalize path lengths. Spread-spectrum clocking (SSC) modulates the clock frequency ±0.5% to reduce EMI peak emissions by spreading energy across a bandwidth.',
    details_zh: '晶體振盪器提供 ±20-50ppm 頻率精度的參考時鐘。PLL 倍增此參考以生成更高的系統時鐘：fout = fref × (N/M)，其中 N 是反饋分頻器，M 是參考分頻器。PLL 抖動來自 VCO 相位噪聲、參考時鐘噪聲和電荷泵噪聲。總抖動 = 確定性抖動（DJ）+ 隨機抖動（RJ）。對於序列鏈接（PCIe、USB），總抖動預算通常 < 0.3UI（單位間隔）。目標之間的時鐘偏斜必須 < 建立時間邊際。H 樹和平衡緩衝樹拓撲均衡路徑長度。擴展頻譜時鐘（SSC）調制時鐘頻率 ±0.5% 以通過在帶寬上分散能量來減少 EMI 峰值發射。',
    formulas: [

    details_zh: 'I2C 驗證方法論（5 個測試項目）：(1) fSCL — 測量 SCL 頻率，快速模式必須 ≤400kHz。失敗：檢查 SOC I2C 時鐘暫存器、上拉值、匯流排電容。(2) tLOW/tHIGH — 在 30%/70% VDD 交叉處測量的 SCL 低/高周期。tLOW 最小 1.3µs，tHIGH 最小 0.6µs。失敗：調整 SOC HCNT/LCNT 暫存器，檢查時鐘拉伸。(3) tr/tf — 上升/下降時間（30%-70% VDD）。最常見的失敗項目。tr 太慢：降低 Rp（4.7kΩ→2.2kΩ→1kΩ）、降低匯流排電容、縮短 PCB 走線。tr 太快（<20ns）：增加 Rp 或添加序列阻尼電阻以防 EMI。(4) tSU:DAT/tHD:DAT — 數據建立（最小 100ns）和保持（0-0.9µs）。失敗：調整 SOC SDA 保持/設置暫存器，檢查 SDA 走線長度。(5) 開始/停止時序 — tHD:STA、tSU:STA、tSU:STO（全部最小 0.6µs）、tBUF（最小 1.3µs）。失敗：調整 FW 時序暫存器，為 tBUF 添加傳輸間延遲。故障排除流程：硬體（Rp、Cb、佈局、焊接品質、功率噪聲）→ 軟體/FW（暫存器配置、驅動初始化、時鐘拉伸超時）→ 系統（功率穩定性、GND 反彈、EMI、探針負載、溫度）。設備：使用 1GHz+ 示波器、≥5GS/s、被動 10MΩ 探針以最小化負載。',

    overview_zh: '晶體振盪器電路（Pierce 振盪器）為 MCU、SOC 和通訊介面提供精確的時鐘參考。理解 4 引腳晶體封裝（引腳 1/3 訊號、引腳 2/4 GND 遮罩）、負載電容計算和常見的佈線錯誤對於可靠的時鐘生成至關重要。不正確的晶體電路導致系統開機失敗、頻率漂移和通訊錯誤。',
    details: 'Pierce oscillator: IC internal inverting amplifier + external crystal (Pin 1→XTLI, Pin 3→XTLO) + two load capacitors (C1: XTLI-to-GND, C2: XTLO-to-GND). Load capacitance calculation: CL = (C1×C2)/(C1+C2) + Cstray. For 12pF crystal spec with Cstray≈3pF, use C1=C2=20pF → CL=(20×20)/(20+20)+3=13pF≈12pF. Six common wiring errors: (1) XTLI/XTLO swapped — gain loop reversed, may not oscillate. (2) Caps across crystal instead of to GND — no AC ground return, won\'t oscillate. (3) Missing one cap — CL wrong, frequency shift or unstable. (4) Caps to VDD instead of GND — power noise couples into oscillator, jitter increases. (5) Pin 2/4 GND pads floating — shell becomes EMI antenna. (6) Caps on Pin 2/4 (GND pads) — GND-to-GND = no effect, signal pins have no load cap. Debug: measure XTLO with oscilloscope — should see clean sine wave ≈VDD amplitude at target frequency. No waveform = not oscillating. Small/unstable waveform = check caps and connections. Frequency offset = wrong CL value.',
    details_zh: 'Pierce 振盪器：IC 內部反演放大器 + 外部晶體（引腳 1→XTLI、引腳 3→XTLO）+ 兩個負載電容（C1：XTLI-to-GND、C2：XTLO-to-GND）。負載電容計算：CL = (C1×C2)/(C1+C2) + Cstray。對於 12pF 晶體規範、Cstray≈3pF，使用 C1=C2=20pF → CL=(20×20)/(20+20)+3=13pF≈12pF。六個常見佈線錯誤：(1) XTLI/XTLO 交換 — 增益迴路反向，可能不振盪。(2) 電容跨晶體而不是到 GND — 沒有交流接地返回，不會振盪。(3) 缺少一個電容 — CL 錯誤、頻率移位或不穩定。(4) 電容到 VDD 而不是 GND — 功率噪聲耦合到振盪器、抖動增加。(5) 引腳 2/4 GND 墊浮動 — 殼層變成 EMI 天線。(6) 電容在引腳 2/4（GND 墊）— GND-to-GND = 無效應、訊號引腳沒有負載電容。除錯：用示波器測量 XTLO — 應該在目標頻率看到清晰的正弦波 ≈VDD 幅度。無波形 = 不振盪。小/不穩定波形 = 檢查電容和連接。頻率偏移 = 錯誤的 CL 值。',

function initSimulator() {
  const canvas = document.getElementById('sim-canvas');
  const ctx = canvas.getContext('2d');
  const oscCanvas = document.getElementById('osc-canvas');
  const oscCtx = oscCanvas.getContext('2d');

  // Draw grid on simulator canvas
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#2a3a5e';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 20) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 20) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Draw sample circuit (simple resistor-capacitor)
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(100, 100);
  ctx.lineTo(300, 100);
  ctx.lineTo(300, 300);
  ctx.lineTo(100, 300);
  ctx.closePath();
  ctx.stroke();

  // Draw resistor symbol
  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.rect(200 + i * 15, 95, 15, 10);
    ctx.stroke();
  }

  // Animate yellow dots along wire
  let dotOffset = 0;
  function animateDots() {
    dotOffset = (dotOffset + 2) % canvas.width;
    ctx.fillStyle = '#ffff00';
    for (let i = 0; i < 5; i++) {
      const x = (100 + dotOffset + i * 50) % canvas.width;
      ctx.beginPath();
      ctx.arc(x, 100, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw oscilloscope waveform
  function drawOscilloscope() {
    const freq = parseFloat(document.getElementById('freq-slider').value);
    const amp = parseFloat(document.getElementById('amp-slider').value);
    const waveform = document.getElementById('waveform-select').value;

    oscCtx.fillStyle = '#0a3a0a';
    oscCtx.fillRect(0, 0, oscCanvas.width, oscCanvas.height);

    // Grid
    oscCtx.strokeStyle = '#1a5a1a';
    oscCtx.lineWidth = 1;
    for (let x = 0; x < oscCanvas.width; x += 50) {
      oscCtx.beginPath();
      oscCtx.moveTo(x, 0);
      oscCtx.lineTo(x, oscCanvas.height);
      oscCtx.stroke();
    }
    for (let y = 0; y < oscCanvas.height; y += 25) {
      oscCtx.beginPath();
      oscCtx.moveTo(0, y);
      oscCtx.lineTo(oscCanvas.width, y);
      oscCtx.stroke();
    }

    // Draw waveform
    oscCtx.strokeStyle = '#00ff00';
    oscCtx.lineWidth = 2;
    oscCtx.beginPath();

    const centerY = oscCanvas.height / 2;
    const scale = 20;
    const period = oscCanvas.width / (freq / 1000);

    for (let x = 0; x < oscCanvas.width; x++) {
      let y;
      const phase = (x / period) * Math.PI * 2;

      if (waveform === 'sine') {
        y = centerY - Math.sin(phase) * amp * scale;
      } else if (waveform === 'square') {
        y = centerY - (Math.sin(phase) > 0 ? amp * scale : -amp * scale);
      } else {
        y = centerY - (Math.abs((phase % (Math.PI * 2)) / Math.PI - 1) * 2 - 1) * amp * scale;
      }

      if (x === 0) {
        oscCtx.moveTo(x, y);
      } else {
        oscCtx.lineTo(x, y);
      }
    }
    oscCtx.stroke();

    requestAnimationFrame(drawOscilloscope);
  }

  drawOscilloscope();
}

}

function toggleExamAnswer(qid) {
  var el = document.getElementById('ans-' + qid);
  if (!el) return;
  var isShowing = el.classList.contains('show');
  if (isShowing) {
    el.classList.remove('show');
  } else {
    el.classList.add('show');
    if (!examRevealed[qid]) {
      examRevealed[qid] = true;
      examScore++;
      var sc = document.getElementById('exam-score');
      if (sc) sc.textContent = examScore;
    }
  }
}

function initPCBCalculator() {
  const w = parseFloat(document.getElementById('calc-w').value);
  const h = parseFloat(document.getElementById('calc-h').value);
  const t = parseFloat(document.getElementById('calc-t').value);
  const er = parseFloat(document.getElementById('calc-er').value);

  const z0 = (87 / Math.sqrt(er + 1.41)) * Math.log(5.98 * h / (0.8 * w + t));
  const resultDiv = document.getElementById('calc-z0-result');

  resultDiv.innerHTML = `<strong>Z₀ ≈ ${z0.toFixed(2)} Ω</strong>`;
}

function selectProtocol(name) {
  const content = document.getElementById('protocol-content');
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  const diagrams = {
    I2C: i2cWaveform,
    SPI: kvlKcl,
    UART: ohmsLaw,
    PCIe: eyeDiagram,
    USB: usbArch,
    eDP: rcCharge,
    MIPI: pnJunction
  };

  content.innerHTML = `
    <div class="diagram-box">
      ${diagrams[name] ? diagrams[name]() : defaultDiagram()}
    </div>
  `;

  initSignalAnimations();
}
