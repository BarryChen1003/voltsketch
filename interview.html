  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">VS</div>
          <div>
            <h1>HardwareAI 硬體實驗室</h1>
            <p>面試考題</p>
          </div>
        </div>
        <nav class="main-nav">
          <a href="index.html" class="nav-link">線路圖</a>
          <a href="ic-library.html" class="nav-link">IC 元件庫</a>
          <a href="knowledge.html" class="nav-link">硬體知識庫</a>

        </nav>
      </header>

      <main style="max-width:820px;margin:0 auto;padding:48px 24px">
        <div style="text-align:center;margin-bottom:28px">
          <div style="font-size:52px">📝🔐</div>
          <h2 style="font-size:24px;color:var(--heading);margin:8px 0" data-i18n="iv_hero_t">硬體面試考題庫</h2>
          <p style="color:var(--muted);font-size:15px" data-i18n="iv_hero_d">類比/電源/數位/PCB/EMC 面試題與解析。完整題庫為付費解鎖。</p>
        </div>

        <!-- 免費試閱 -->
        <section style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:20px">
          <h3 style="margin:0 0 12px;color:var(--heading)" data-i18n="iv_free_t">免費試閱（2 題）</h3>
          <details style="margin-bottom:10px"><summary style="cursor:pointer;font-weight:600" data-i18n="iv_q1">Q1. 去耦電容為何要靠近 IC 電源腳？</summary>
            <p style="color:var(--muted);margin-top:6px" data-i18n="iv_q1a">縮短電流迴路降低寄生電感，瞬態電流由近端電容供應、減少電源軌壓降與雜訊；小容值最靠腳、大容值稍遠。</p></details>
          <details><summary style="cursor:pointer;font-weight:600" data-i18n="iv_q2">Q2. 開漏輸出為何要上拉電阻？</summary>
            <p style="color:var(--muted);margin-top:6px" data-i18n="iv_q2a">開漏只能拉低、不能輸出高電位，需外接上拉到目標邏輯電壓才有高準位；阻值權衡速度(RC)與耗電。</p></details>
        </section>

        <!-- 完整題庫：登入 + interview_paid 才由後端(RLS)取得；未授權永遠拿不到題目資料 -->
        <section id="fullBank" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px">
          <div id="bankStatus" style="text-align:center;color:var(--muted)" data-i18n="iv_loading">載入中…</div>
          <div id="bankList"></div>
        </section>
      </main>
    </div>

    <script src="./interview-bank.js?v=2026-07-17a"></script>
    <script src="./interview-bank-i18n.js?v=2026-07-21a"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./auth-config.js?v=2026-07-04a"></script>
  <script src="./observe.js?v=1"></script>
    <script src="./auth.js?v=2026-07-04b"></script>
    <script src="./plan.js?v=2026-07-03"></script>
    <script>
      (async function () {
        const T = (k, v) => window.I18N ? window.I18N.t(k, v) : k;
        // i18n.js 是最後一個 script：async 流程可能跑贏它 → 等 load 保證字典就緒
        if (!window.I18N) await new Promise(r => window.addEventListener('load', r, { once: true }));
        document.addEventListener('vs-lang-change', () => location.reload());  // 鎖卡/題庫全路徑：切語言重載重繪
        const statusEl = document.getElementById('bankStatus');
        const listEl = document.getElementById('bankList');
        const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        function lockBox(title, sub, btnText, btnHref) {
          statusEl.removeAttribute('data-i18n');  // 容器轉為動態內容，防 i18n apply() 蓋回「載入中」
          statusEl.innerHTML =
            '<div style="font-size:30px">🔒</div>' +
            '<p style="color:var(--heading);font-weight:600;margin:6px 0">' + esc(title) + '</p>' +
            '<p style="color:var(--muted);font-size:13px">' + esc(sub) + '</p>' +
            (btnText ? '<a class="primary-button" style="display:inline-block;padding:8px 18px;margin-top:8px" href="' + btnHref + '">' + esc(btnText) + '</a>' : '');
        }
        // 語言選取：zh 預設；en/ja/ko 依 I18N.lang（DB 欄位缺譯時回退 zh）
        const LANG = (window.I18N && ['en', 'ja', 'ko'].indexOf(I18N.lang) >= 0) ? I18N.lang : 'zh';
        function renderQuestions(rows) {
          // question/answer 為後端(admin RLS 寫)富文字 → 直接渲染 HTML；分類字串仍逸出
          statusEl.removeAttribute('data-i18n');
          statusEl.style.display = 'none';
          let html = '<h3 style="margin:0 0 12px;color:var(--heading)">' + esc(T('iv_bank_t', { n: rows.length })) + '</h3>';
          let lastCat = null;
          rows.forEach(r => {
            const cat = (LANG !== 'zh' && r['category_' + LANG]) || r.category;
            const question = (LANG !== 'zh' && r['question_' + LANG]) || r.question;
            const answer = (LANG !== 'zh' && r['answer_' + LANG]) || r.answer;
            if (cat !== lastCat) {
              html += '<h4 style="margin:20px 0 8px;color:#b45309;border-bottom:1px solid var(--line);padding-bottom:4px">' + esc(cat) + '</h4>';
              lastCat = cat;
            }
            html += '<details style="margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px">' +
              '<summary style="cursor:pointer;font-weight:600">' + question + '</summary>' +
              '<div style="color:var(--muted);margin-top:8px;line-height:1.6">' + answer + '</div></details>';
          });
          listEl.innerHTML = html;
        }

        // demo 模式（未填金鑰）：預設鎖定，與正式一致（面試題=12 個月方案解鎖）。
        // 站主預覽：?unlock=1 全開（plan.js 記住），?lock=1 恢復。接 Supabase 後走 RLS。
        if (!window.Auth || !Auth.enabled()) {
          let p = { interviewUnlocked: false };
          try { p = await window.Plan.get(); } catch (e) {}
          if (!p.interviewUnlocked) {
            lockBox(T('iv_lock12_t'), T('iv_lock12_d'), T('iv_plan_btn'), 'upgrade.html');
            return;
          }
          const bank = window.INTERVIEW_BANK || [];
          // 併入 ja/ko 內容層（interview-bank-i18n.js）；{{SVG}} = 沿用 zh 版電路圖
          const M = window.INTERVIEW_BANK_I18N || {};
          bank.forEach(q => { const m = M[q.id]; if (m) Object.assign(q, m); });
          const lang = (window.I18N && ['en', 'ja', 'ko'].indexOf(I18N.lang) >= 0) ? I18N.lang : 'zh';
          const CATKEY = { zh: 'catZh', en: 'catEn', ja: 'catJa', ko: 'catKo' };
          statusEl.removeAttribute('data-i18n');
          statusEl.innerHTML = '<span style="color:#b45309">' + esc(T('iv_devmode', { n: bank.length })) + '</span>';
          let html = '', lastCat = '';
          bank.forEach(q => {
            const cat = q[CATKEY[lang]] || q.catZh;
            if (cat !== lastCat) { html += '<h3 style="color:var(--heading);margin:18px 0 8px;border-bottom:2px solid #1f4fd1;padding-bottom:4px">' + cat + '</h3>'; lastCat = cat; }
            const d = q[lang] || q.zh;
            let ans = d.answer;
            if (ans.indexOf('{{SVG}}') >= 0) {
              const svg = (q.zh.answer.match(/<div class="exam-diagram-box">[\s\S]*?<\/svg><\/div>/) || [''])[0];
              ans = ans.split('{{SVG}}').join(svg);
            }
            html += '<details style="margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px">' +
              '<summary style="cursor:pointer;font-weight:600;line-height:1.6">' + d.text + '</summary>' +
              '<div style="color:var(--muted);margin-top:8px;line-height:1.7">' + ans + '</div></details>';
          });
          listEl.innerHTML = html;
          return;
        }
        const user = await Auth.user();
        if (!user) { lockBox(T('iv_lockpay_t'), T('iv_login_d'), T('iv_login_btn'), 'login.html'); return; }

        const ent = await Auth.entitlements();
        if (!ent.interview_paid && ent.role !== 'admin') {
          lockBox(T('iv_lockpay_t'), T('iv_nopriv_d'), '', '');
          return;
        }
        const rows = await Auth.getInterviewQuestions();
        if (!rows) { lockBox(T('iv_fail_t'), T('iv_fail_d'), '', ''); return; }
        if (!rows.length) { lockBox(T('iv_empty_t'), T('iv_empty_d'), '', ''); return; }
        renderQuestions(rows);
      })();
    </script>
    <script src="./i18n.js?v=2026-07-21a"></script>
</body>
</html>
