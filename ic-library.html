<head>
  <meta charset="utf-8" />

  <meta name="description" content="IC 元件庫：110+ 顆常用 IC 的 pinout 接腳定義、規格、第二供應商評估與 drop-in 替代料，可放進線路圖或匯出 KiCad 符號。">
  <link rel="canonical" href="https://barrychen1003.github.io/voltsketch/ic-library.html">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <meta property="og:site_name" content="HardwareAI">
  <meta property="og:title" content="IC 元件庫 - HardwareAI">
  <meta property="og:description" content="IC 元件庫：110+ 顆常用 IC 的 pinout 接腳定義、規格、第二供應商評估與 drop-in 替代料，可放進線路圖或匯出 KiCad 符號。">
  <meta property="og:type" content="website">

  <style>
    html, body { height: auto; min-height: 100%; overflow-y: auto; }
    body { background: #f6f8fc; margin: 0; }
    .iclib { display: grid; grid-template-columns: 220px 260px 1fr; gap: 0; height: calc(100vh - 60px); }
    @media (max-width: 900px) { .iclib { grid-template-columns: 1fr; height: auto; } }
    .col { overflow-y: auto; padding: 12px; }
    .cats { background: #fff; border-right: 1px solid #e2e8f0; }
    .cat-btn { display: block; width: 100%; text-align: left; padding: 7px 10px; border: none; background: none; border-radius: 6px; cursor: pointer; font-size: 13px; color: #334155; }
    .cat-btn:hover { background: #f1f5f9; }
    .cat-btn.active { background: #1d2943; color: #fff; }
    .cat-btn .n { color: #94a3b8; font-size: 11px; float: right; }
    .cat-btn.active .n { color: #cbd5e1; }
    .list { background: #fbfcfe; border-right: 1px solid #e2e8f0; }
    .ic-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: ui-monospace, monospace; color: #0f172a; }
    .ic-item:hover { background: #eef2ff; }
    .ic-item.active { background: #dbeafe; }
    .ic-item .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; }
    .ic-item .filled { background: #dcfce7; color: #15803d; }
    .ic-item .empty { background: #f1f5f9; color: #94a3b8; }
    .detail { background: #fff; }
    .srch { width: 100%; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 8px; font-size: 13px; box-sizing: border-box; }
    .ic-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
    .ic-head h2 { margin: 0; color: #0f172a; }
    .spec-box { border: 1px solid #eef2f7; border-radius: 8px; overflow: hidden; margin-top: 8px; }
    .spec-box h3 { margin: 0; padding: 8px 12px; background: #1d2943; color: #fff; font-size: 14px; }
    .spec-row { display: grid; grid-template-columns: 130px 1fr; border-top: 1px solid #f1f5f9; font-size: 13px; }
    .spec-row .k { background: #f8fafc; color: #475569; padding: 6px 10px; font-weight: 600; }
    .spec-row .v { padding: 6px 10px; color: #0f172a; }
    .sec { margin-top: 14px; } .sec h4 { margin: 0 0 6px; font-size: 14px; } .sec ul { margin: 0; padding-left: 18px; color: #334155; font-size: 13px; line-height: 1.6; }
    .symbol-box { border: 1px solid #eef2f7; border-radius: 8px; padding: 8px; text-align: center; overflow: auto; }
    .symbol-box svg { max-width: 100%; height: auto; }
    .pintab { margin-top: 16px; } .pintab table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pintab th { background: #1d2943; color: #fff; text-align: left; padding: 6px 10px; } .pintab th:first-child { text-align: center; width: 40px; }
    .pintab td { border-bottom: 1px solid #eef2f7; padding: 6px 10px; vertical-align: top; } .pintab tbody tr:nth-child(even) { background: #f8fafc; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand"><div class="brand-mark" aria-hidden="true">VS</div><div><h1>HardwareAI 硬體實驗室</h1><p data-i18n="nav_iclib">IC 元件庫</p></div></div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">線路圖</a>
        <a href="ic-library.html" class="nav-link active">IC 元件庫</a>
        <a href="knowledge.html" class="nav-link">硬體知識庫</a>
        <a href="pcb.html" class="nav-link">PCB Layout</a>
        <a href="interview.html" class="nav-link">面試考題</a>
        <a href="upgrade.html" class="nav-link">升級 VIP</a>
        <a href="contact.html" class="nav-link">聯絡資訊</a>
        </nav>
    </header>
    <div class="iclib">
      <div class="col cats" id="cats"></div>
      <div class="col list"><input class="srch" id="srch" type="search" placeholder="搜尋料號…"/><div id="icList"></div></div>
      <div class="col detail" id="detail"><p style="color:#94a3b8;padding:20px">← 左邊選分類，中間點料號看詳細頁</p></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js?v=2026-07-04a"></script>
  <script src="./observe.js?v=1"></script>
  <script src="./auth.js?v=2026-07-21a"></script>
  <script src="./ic-symbol.js?v=2026-07-16a"></script>
  <script src="./ic-data.js?v=43"></script>
  <script src="./ic-i18n.js?v=2026-07-17a"></script>
  <script src="./ic-i18n-data.js?v=2026-07-17a"></script>
  <script src="./ic-pin-i18n-data.js?v=2026-07-14s"></script>
  <script src="./ic-crit-i18n-data.js?v=2026-07-14c"></script>
  <script src="./ic-classification.js?v=5"></script>
  <script src="./ic-export.js"></script>
  <script src="./vs-model.js"></script>
  <script src="./vs-adapters.js"></script>
  <script src="./export-gate.js?v=2"></script>
  <script src="./skill-swap.js"></script>
  <script>
    const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    const norm = s => String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const CL = window.IC_CLASSIFICATION || {};
    const DATA = window.IC_DATA || [];
    const dataMap = {}; DATA.forEach(ic => dataMap[norm(ic.part)] = ic);
    const catLabelZh = {}; (window.IC_CATEGORIES || []).forEach(c => catLabelZh[c.id] = c.label);
    catLabelZh['_unclassified'] = '未分類（待複核）'; catLabelZh['_misc-non-ti'] = '其他/非 TI（待複核）';
    // category label i18n (id -> {en,ja,ko}); zh falls back to the bilingual IC_CATEGORIES label
    const CAT_I18N = {
      amplifiers: { en: 'Amplifiers', ja: 'Amplifiers アンプ', ko: 'Amplifiers 증폭기' },
      audio: { en: 'Audio, haptics & piezo', ja: 'Audio, haptics & piezo 音声/ハプティクス/圧電', ko: 'Audio, haptics & piezo 오디오/햅틱/압전' },
      clocks: { en: 'Clocks & timing', ja: 'Clocks & timing クロック/タイミング', ko: 'Clocks & timing 클록/타이밍' },
      dlp: { en: 'DLP products', ja: 'DLP products', ko: 'DLP products' },
      'data-converters': { en: 'Data converters (ADC/DAC/AFE)', ja: 'Data converters データコンバータ (ADC/DAC/AFE)', ko: 'Data converters 데이터 컨버터 (ADC/DAC/AFE)' },
      'die-wafer': { en: 'Die & wafer services', ja: 'Die & wafer services', ko: 'Die & wafer services' },
      interface: { en: 'Interface (USB/Ethernet/CAN/RS-485)', ja: 'Interface インターフェース (USB/Ethernet/CAN/RS-485)', ko: 'Interface 인터페이스 (USB/Ethernet/CAN/RS-485)' },
      isolation: { en: 'Isolation', ja: 'Isolation 絶縁', ko: 'Isolation 절연' },
      logic: { en: 'Logic & voltage translation', ja: 'Logic & voltage translation ロジック/レベル変換', ko: 'Logic & voltage translation 로직/전압 변환' },
      mcu: { en: 'MCUs & processors', ja: 'MCUs & processors マイコン/プロセッサ', ko: 'MCUs & processors 마이크로컨트롤러/프로세서' },
      memory: { en: 'Memory (Flash/EEPROM/DRAM)', ja: 'Memory メモリ (Flash/EEPROM/DRAM)', ko: 'Memory 메모리 (Flash/EEPROM/DRAM)' },
      motor: { en: 'Motor drivers', ja: 'Motor drivers モータドライバ', ko: 'Motor drivers 모터 드라이버' },
      power: { en: 'Power management', ja: 'Power management 電源管理', ko: 'Power management 전원 관리' },
      rf: { en: 'RF & microwave (incl. mmWave radar)', ja: 'RF & microwave 高周波/マイクロ波 (mmWave レーダー含む)', ko: 'RF & microwave 고주파/마이크로파 (mmWave 레이더 포함)' },
      sensors: { en: 'Sensors', ja: 'Sensors センサ', ko: 'Sensors 센서' },
      'switch-mux': { en: 'Switch & multiplexers', ja: 'Switch & multiplexers スイッチ/マルチプレクサ', ko: 'Switch & multiplexers 스위치/멀티플렉서' },
      wireless: { en: 'Wireless connectivity', ja: 'Wireless connectivity 無線接続', ko: 'Wireless connectivity 무선 연결' },
      _unclassified: { en: 'Unclassified (under review)', ja: '未分類（要確認）', ko: '미분류(검토 필요)' },
      '_misc-non-ti': { en: 'Other / non-TI (under review)', ja: 'その他/非 TI（要確認）', ko: '기타/비 TI(검토 필요)' }
    };
    function catLabelLoc(id) {
      const lang = window.icLang ? icLang() : 'zh';
      if (lang !== 'zh' && CAT_I18N[id] && CAT_I18N[id][lang]) return CAT_I18N[id][lang];
      return catLabelZh[id] || id;
    }
    let curCat = null;

    function renderCats() {
      const keys = Object.keys(CL).sort((a, b) => CL[b].length - CL[a].length);
      document.getElementById('cats').innerHTML = keys.map(k =>
        `<button class="cat-btn${k === curCat ? ' active' : ''}" data-cat="${k}">${esc(catLabelLoc(k))}<span class="n">${CL[k].length}</span></button>`).join('');
    }
    function renderList(filter) {
      if (!curCat) { document.getElementById('icList').innerHTML = `<p style="color:#94a3b8;font-size:12px;padding:8px">${esc(ui('pickCat'))}</p>`; return; }
      let parts = CL[curCat].slice().sort();
      if (filter) parts = parts.filter(p => p.toLowerCase().includes(filter));
      document.getElementById('icList').innerHTML = parts.map(p => {
        const has = !!dataMap[norm(p)];
        return `<div class="ic-item" data-ic="${esc(p)}"><span>${esc(p)}</span><span class="badge ${has ? 'filled' : 'empty'}">${has ? esc(ui('filled')) : esc(ui('empty'))}</span></div>`;
      }).join('') || `<p style="color:#94a3b8;font-size:12px;padding:8px">${esc(ui('noMatch'))}</p>`;
    }

    const nameHTML = n => String(n).split(/(\{[^}]*\})/).filter(s => s !== '').map(p => /^\{.*\}$/.test(p) ? `<span style="text-decoration:overline">${esc(p.slice(1, -1))}</span>` : esc(p)).join('');
    const ui = k => (window.icUI ? icUI(k) : k);
    function pinTable(ic) {
      const pins = (ic.pins || []).slice().sort((a, b) => (a.num || 0) - (b.num || 0));
      const rows = pins.map(p => `<tr><td style="text-align:center;font-weight:600">${esc(p.num)}</td><td style="font-family:ui-monospace,monospace">${nameHTML(p.name)}</td><td style="white-space:nowrap;color:#475569">${esc(p.type || '')}</td><td>${esc(p.desc || '')}</td></tr>`).join('');
      return `<div class="pintab"><h4>${esc(ui('pinDef'))}</h4><table><thead><tr><th>${esc(ui('pin'))}</th><th>${esc(ui('name'))}</th><th>${esc(ui('type'))}</th><th>${esc(ui('fn'))}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    function detailCard(ic) {
      if (window.icLocalized) ic = icLocalized(ic);
      const mu = ICSymbol.renderMulti ? ICSymbol.renderMulti(ic) : { split: false, units: [Object.assign({ label: null }, ICSymbol.render(ic))] };
      const unitLabel = l => !l ? '' : (l.kind === 'pwr' ? ui('unitPwr') : ui('unitSig') + (l.n > 1 ? ` ${l.i}/${l.n}` : ''));
      const symBoxes = mu.units.map(u => (u.label ? `<div style="font-size:12px;color:#64748b;margin:8px 0 2px"><b>${esc(ic.part)}</b> — ${esc(unitLabel(u.label))}</div>` : '') + `<div class="symbol-box">${u.svg}</div>`).join('');
      const specs = (ic.specs || []).map(s => `<div class="spec-row"><div class="k">${esc(s.k)}</div><div class="v">${esc(s.v)}</div></div>`).join('');
      const drop = (ic.dropIn || []).map(d => `<li><b style="color:#15803d">${esc(d.part)}</b> — ${esc(d.note || '')}</li>`).join('');
      const crit = (ic.secondSource || []).map(s => `<li>${esc(s)}</li>`).join('');
      const row = (l, v) => v ? `<div style="display:grid;grid-template-columns:64px 1fr;gap:8px;margin:3px 0"><div style="color:#64748b;font-weight:600">${l}</div><div>${esc(v)}</div></div>` : '';
      return `<div style="padding:18px">
        <div class="ic-head"><div><h2>${esc(ic.part)}</h2><div style="color:#64748b;font-size:13px">${esc(ic.subcategory || '')} · ${esc(ic.package || '')}</div></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <a class="primary-button" style="padding:6px 14px;font-size:13px" href="index.html?addIC=${encodeURIComponent('data:' + ic.part)}">＋ ${esc(ui('addToSchem'))}</a>
            <select id="exportFmt" style="padding:5px 8px;border:1px solid #e2e8f0;border-radius:5px;font-size:13px">
              <optgroup label="${esc(ui('optNative'))}">${VSAdapters.list().filter(a => a.kind === 'native').map(a => `<option value="${a.id}" title="${esc(a.note)}">${esc(a.label)}</option>`).join('')}</optgroup>
              <optgroup label="${esc(ui('optViaTool'))}">${VSAdapters.list().filter(a => a.kind === 'via-tool').map(a => `<option value="${a.id}" title="${esc(a.note)}">${esc(a.label)}</option>`).join('')}</optgroup>
            </select>
            <button class="small-button" data-export="go" data-part="${esc(ic.part)}">${esc(ui('exportBtn'))}</button>
            <span id="exportMsg" style="font-size:12px;color:#94a3b8"></span>
          </div></div>
        <div style="background:#f8fafc;border:1px solid #eef2f7;border-radius:8px;padding:12px;margin:12px 0;font-size:13px">${row(esc(ui('whatIs')), ic.whatIs)}${row(esc(ui('func')), ic.func)}${row(esc(ui('usedIn')), ic.usedIn)}</div>
        ${symBoxes}
        <div class="spec-box"><h3>${esc(ui('specs'))}</h3>${specs}</div>
        <div class="sec"><h4 style="color:#15803d">${esc(ui('dropIn'))}</h4>${drop ? `<ul>${drop}</ul>` : `<p style="color:#64748b;font-size:13px">${esc(ui('none'))}</p>`}</div>
        ${crit ? `<div class="sec"><h4>${esc(ui('critTitle'))}</h4><ul>${crit}</ul></div>` : ''}
        ${(ic.dropIn && ic.dropIn.length) ? `<div class="sec"><h4>${esc(ui('skillTitle'))}</h4>
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px">
            <span>${esc(ui('swapPre'))} <b>${esc(ic.part)}</b> ${esc(ui('swapPost'))}</span>
            <select id="swapTarget">${ic.dropIn.map(d => `<option value="${esc(d.part)}">${esc(d.part)}</option>`).join('')}</select>
            <span>refdes</span><input id="swapRefs" placeholder="U3 U7 U12" style="padding:4px 8px;border:1px solid #e2e8f0;border-radius:5px;width:160px"/>
            <button class="small-button" data-skill="gen" data-part="${esc(ic.part)}">${esc(ui('skillGen'))}</button>
          </div>
          <p style="color:#94a3b8;font-size:12px;margin:6px 0 0">${esc(ui('skillNote'))}</p></div>` : ''}
        ${pinTable(ic)}
      </div>`;
    }
    let curPart = null;
    function applyStaticUI() {
      const s = document.getElementById('srch'); if (s) s.placeholder = ui('searchPh');
      if (!curPart) { const d = document.getElementById('detail'); if (d) d.innerHTML = `<p style="color:#94a3b8;padding:20px">${esc(ui('listHint'))}</p>`; }
    }
    document.addEventListener('vs-lang-change', () => {
      applyStaticUI();
      renderCats();
      if (curPart) showDetail(curPart);
      renderList((document.getElementById('srch').value || '').toLowerCase().trim());
    });
    applyStaticUI();
    function showDetail(part) {
      curPart = part;
      const ic = dataMap[norm(part)];
      const d = document.getElementById('detail');
      if (ic) { d.innerHTML = detailCard(ic); return; }
      d.innerHTML = `<div style="padding:24px"><h2 style="color:#0f172a;font-family:ui-monospace,monospace">${esc(part)}</h2>
        <p style="color:#b45309">${esc(ui('notBuilt'))}</p>
        <p style="color:#475569;font-size:13px">datasheet：<a href="IC-spec/${esc(part)}.pdf" target="_blank">${esc(part)}.pdf</a></p>
        <p style="color:#94a3b8;font-size:13px">${esc(ui('notBuiltHint'))}</p></div>`;
    }

    document.getElementById('cats').addEventListener('click', e => {
      const b = e.target.closest('.cat-btn'); if (!b) return;
      curCat = b.dataset.cat;
      document.querySelectorAll('.cat-btn').forEach(x => x.classList.toggle('active', x === b));
      document.getElementById('srch').value = ''; renderList('');
    });
    document.getElementById('icList').addEventListener('click', e => {
      const it = e.target.closest('.ic-item'); if (!it) return;
      document.querySelectorAll('.ic-item').forEach(x => x.classList.toggle('active', x === it));
      showDetail(it.dataset.ic);
    });
    document.getElementById('srch').addEventListener('input', e => renderList(e.target.value.toLowerCase().trim()));
    document.getElementById('detail').addEventListener('click', async e => {
      const ex = e.target.closest('[data-export]');
      if (ex) {
        const ic = dataMap[norm(ex.dataset.part)]; if (!ic || !window.VSAdapters) return;
        const fmt = document.getElementById('exportFmt').value;
        const msg = document.getElementById('exportMsg');
        const r = await VSAdapters.exportIC(fmt, ic);
        if (!r.ok) {
          msg.style.color = '#b91c1c';
          msg.textContent = r.reason === 'not_authenticated' ? ui('msgLogin')
            : r.reason === 'quota_exceeded' ? ui('msgQuota')
            : r.reason;
        } else { msg.style.color = '#15803d'; msg.textContent = r.remaining >= 0 ? (ui('exportedLeft') + r.remaining + ui('exportedRight')) : ui('exported'); }
        return;
      }
      const sk = e.target.closest('[data-skill]');
      if (sk && window.SkillSwap) {
        const ic = dataMap[norm(sk.dataset.part)]; if (!ic) return;
        const tgt = document.getElementById('swapTarget').value;
        const refs = document.getElementById('swapRefs').value.split(/[\s,]+/);
        const il = SkillSwap.genSkill(ic.part, tgt, ic.package || '', refs);
        ICExport.download('swap_' + ic.part + '_to_' + tgt + '.il', il);
      }
    });

    renderCats();
    const firstFilled = Object.keys(CL).find(k => CL[k].some(p => dataMap[norm(p)]));
    if (firstFilled) { document.querySelector(`[data-cat="${firstFilled}"]`)?.click(); }
  </script>
  <script src="./i18n.js?v=2026-07-21a"></script>
</body>
</html>
