<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登入 - VoltSketch</title>
  <meta name="description" content="登入 VoltSketch 帳號。">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://barrychen1003.github.io/voltsketch/login.html">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <meta property="og:site_name" content="VoltSketch">
  <meta property="og:title" content="登入 - VoltSketch">
  <meta property="og:description" content="登入 VoltSketch 帳號。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://barrychen1003.github.io/voltsketch/login.html">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .auth-wrap { max-width: 420px; margin: 48px auto; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 28px; }
      .auth-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
      .auth-tab { flex: 1; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; }
      .auth-tab.active { background: var(--accent, #1f4fd1); color: #fff; border-color: var(--accent, #1f4fd1); }
      .auth-wrap input { width: 100%; padding: 9px; border: 1px solid #cbd5e1; border-radius: 8px; margin: 6px 0; }
      .auth-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
      .muted { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand"><div class="brand-mark">VS</div><div><h1>VoltSketch 硬體實驗室</h1><p>帳號登入</p></div></div>
        <nav class="main-nav"><a href="index.html" class="nav-link">← 回線路圖</a>  <a href="upgrade.html" class="nav-link">升級 VIP</a><a href="contact.html" class="nav-link">聯絡資訊</a>
        </nav>
      </header>

      <div class="auth-wrap">
        <div class="auth-tabs">
          <button class="auth-tab active" data-mode="login" data-i18n="lg_login">登入</button>
          <button class="auth-tab" data-mode="signup" data-i18n="lg_signup">註冊</button>
          <button class="auth-tab" data-mode="forgot" data-i18n="lg_forgot">忘記密碼</button>
        </div>

        <div id="demoNote" class="muted" hidden style="margin-bottom:10px;color:#b45309" data-i18n="lg_demo">
          ⚠ 尚未設定 Supabase（auth-config.js）。目前為本機 demo 模式，無法真正登入。
        </div>

        <input id="email" type="email" placeholder="email" autocomplete="email" />
        <input id="password" type="password" placeholder="密碼（至少 6 碼）" data-i18n-placeholder="lg_pw_ph" autocomplete="current-password" />
        <button class="primary-button" id="submitBtn" style="width:100%;margin-top:6px">登入</button>

        <div id="msg" class="auth-msg"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./auth-config.js?v=2026-07-04a"></script>
    <script src="./auth.js?v=2026-07-04b"></script>
    <script>
      const $ = id => document.getElementById(id);
      const T = (k, v) => window.I18N ? window.I18N.t(k, v) : k;  // i18n.js 稍後載入；互動時已可用
      let mode = 'login';
      const msg = (t, ok) => { const m = $('msg'); m.textContent = t; m.style.color = ok ? '#16a34a' : '#dc2626'; };

      if (!Auth.enabled()) $('demoNote').hidden = false;

      // 送出鈕標籤依 mode＋語言（不能掛 data-i18n，否則切語言會蓋掉非 login 模式的標籤）
      const updateBtn = () => { $('submitBtn').textContent = mode === 'login' ? T('lg_login') : mode === 'signup' ? T('lg_signup') : T('lg_send_reset'); };
      setTimeout(updateBtn, 0);  // i18n.js 於本 script 之後載入，延到下一輪
      document.addEventListener('vs-lang-change', updateBtn);

      document.querySelectorAll('.auth-tab').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); mode = b.dataset.mode;
        $('password').style.display = (mode === 'forgot') ? 'none' : '';
        updateBtn();
        msg('');
      }));

      $('submitBtn').addEventListener('click', async () => {
        if (!Auth.enabled()) { msg(T('lg_cfg')); return; }
        const email = $('email').value.trim(), pw = $('password').value;
        try {
          if (mode === 'login') {
            const { error } = await Auth.signIn(email, pw);
            if (error) throw error; msg(T('lg_ok'), true);
            const nx = new URLSearchParams(location.search).get('next');
            const dest = (nx && /^[\w-]+\.html$/.test(nx)) ? nx : 'index.html';  // 白名單：站內頁檔名
            setTimeout(() => location.href = dest, 800);
          } else if (mode === 'signup') {
            const { error } = await Auth.signUp(email, pw);
            if (error) throw error; msg(T('lg_signup_ok'), true);
          } else {
            const { error } = await Auth.reset(email);
            if (error) throw error; msg(T('lg_reset_ok'), true);
          }
        } catch (e) { msg(e.message || T('lg_fail')); }
      });

      // Google / 手機登入已移除（2026-07-04 站主指示）：僅 email。要恢復見 git 歷史 + SETUP-AUTH.md。
    </script>
    <script src="./i18n.js?v=2026-07-17a"></script>
</body>
</html>
